.pulse-dot {

.audio-wave {

  align-items: center;
}

.audio-bar {
  width: 3px;
  height: 20px;

.choice-button {

}

.choice-button:hover {

}

  transition: all 0.3s ease;

.genre-card:hover {

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const RunAdventureApp = () => {
      // Auth & Data
      const [currentUser, setCurrentUser] = useState(null);
      const [showAuthModal, setShowAuthModal] = useState(true);
      const [authMode, setAuthMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');

      // Adventure State
      const [gameState, setGameState] = useState(null);
      const [isRunning, setIsRunning] = useState(false);
      const [selectedGenre, setSelectedGenre] = useState(null);
      const [currentLocation, setCurrentLocation] = useState(null);
      const [previousLocation, setPreviousLocation] = useState(null);
      const [routeHistory, setRouteHistory] = useState([]);

      // Story State
      const [currentChapter, setCurrentChapter] = useState(null);
      const [storyLog, setStoryLog] = useState([]);
      const [choices, setChoices] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [isAudioPlaying, setIsAudioPlaying] = useState(false);
      const [audioUrl, setAudioUrl] = useState(null);
      const [nearbyIntersections, setNearbyIntersections] = useState([]);
      const [choicesVisible, setChoicesVisible] = useState(false);
      const [detectedIntersection, setDetectedIntersection] = useState(null);

      // Geolocation
      const watchIdRef = useRef(null);
      const audioRef = useRef(null);
      const lastIntersectionRef = useRef(null);
      const distanceTrackedRef = useRef(0);

      const MISTRAL_API_KEY = 'nrayQwviJ8l6nyTdq5mTweYgrgnrz6DZ';
      const MISTRAL_TTS_VOICE = 'en_paul_neutral';
      const MISTRAL_TTS_MODEL = 'voxtral-mini-tts-2603';
      const INTERSECTION_TRIGGER_DISTANCE = 0.15; // km
      const GENRES = ['fantasy', 'sci-fi', 'mystery', 'horror', 'adventure'];

      // ==================== AUTH ====================
      const handleAuth = (e) => {
        e.preventDefault();
        const users = JSON.parse(localStorage.getItem('runUsers') || '[]');
        
        if (authMode === 'signup') {
          if (users.find(u => u.email === email)) {
            alert('Email already registered!');
            return;
          }
          const newUser = { id: Date.now(), email, password, adventures: [] };
          users.push(newUser);
          localStorage.setItem('runUsers', JSON.stringify(users));
          setCurrentUser(newUser);
        } else {
          const user = users.find(u => u.email === email && u.password === password);
          if (!user) {
            alert('Invalid credentials!');
            return;
          }
          setCurrentUser(user);
        }
        setShowAuthModal(false);
        setEmail('');
        setPassword('');
      };

      const handleLogout = () => {
        if (watchIdRef.current) {
          navigator.geolocation.clearWatch(watchIdRef.current);
        }
        setCurrentUser(null);
        setGameState(null);
        setSelectedGenre(null);
        setIsRunning(false);
        setShowAuthModal(true);
      };

      // ==================== GEOLOCATION ====================
      const calculateDistance = (lat1, lng1, lat2, lng2) => {
        const R = 6371; // km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLng / 2) * Math.sin(dLng / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return c * R;
      };

      const startTracking = () => {
        if (!navigator.geolocation) {
          alert('Geolocation not supported on your device');
          return;
        }

        setIsRunning(true);
        distanceTrackedRef.current = 0;

        watchIdRef.current = navigator.geolocation.watchPosition(
          (position) => {
            const newLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
              timestamp: Date.now(),
              accuracy: position.coords.accuracy
            };
            
            setCurrentLocation(newLocation);
            
            if (previousLocation) {
              const distance = calculateDistance(
                newLocation.lat, newLocation.lng,
                previousLocation.lat, previousLocation.lng
              );
              distanceTrackedRef.current += distance;

              if (distanceTrackedRef.current >= INTERSECTION_TRIGGER_DISTANCE && !choicesVisible && !isAudioPlaying) {
                distanceTrackedRef.current = 0;
                checkForIntersection(newLocation);
              }
            }
            
            setPreviousLocation(newLocation);
            setRouteHistory(prev => [...prev, newLocation]);
          },
          (error) => console.error('Geolocation error:', error),
          { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
        );
      };

      const stopTracking = () => {
        if (watchIdRef.current) {
          navigator.geolocation.clearWatch(watchIdRef.current);
        }
        setIsRunning(false);
      };

      // ==================== INTERSECTION DETECTION ====================
      const generateMockIntersections = (location) => {
        // Generate realistic street names and intersections
        const streets = [
          { name: 'Main St', lng_offset: 0.001 },
          { name: 'Oak Ave', lng_offset: -0.001 },
          { name: 'Elm St', lng_offset: 0.002 },
          { name: 'Park Rd', lng_offset: -0.002 },
          { name: 'Pine St', lng_offset: 0.0015 },
          { name: 'Maple Ave', lng_offset: -0.0015 }
        ];

        const primary = streets[Math.floor(Math.random() * streets.length)];
        const secondary = streets[Math.floor(Math.random() * streets.length)];

        return [
          {
            id: 1,
            name: `${primary.name} & ${secondary.name}`,
            direction: 'left',
            lat: location.lat + 0.0008,
            lng: location.lng + primary.lng_offset,
            description: `Turn left onto ${secondary.name}`
          },
          {
            id: 2,
            name: `${primary.name} & ${secondary.name}`,
            direction: 'straight',
            lat: location.lat,
            lng: location.lng + 0.003,
            description: `Continue straight on ${primary.name}`
          },
          {
            id: 3,
            name: `${secondary.name} & Ridge Ave`,
            direction: 'right',
            lat: location.lat - 0.0008,
            lng: location.lng + 0.0025,
            description: `Turn right onto Ridge Ave`
          }
        ];
      };

      const checkForIntersection = async (location) => {
        if (choicesVisible || isAudioPlaying || isGenerating) return;

        const intersections = generateMockIntersections(location);
        setNearbyIntersections(intersections);
        setDetectedIntersection(intersections[0]);
        
        await generateChoices(intersections);
      };

      // ==================== STORY GENERATION ====================
      const generateChoices = async (intersections) => {
        setIsGenerating(true);
        setChoicesVisible(false);

        try {
          const intersectionText = intersections
            .map(i => `${i.name} (heading ${i.direction}): ${i.description}`)
            .join('; ');

          const prompt = `You are creating an interactive adventure story for a runner. The runner has reached a real intersection in their running route.

Genre: ${selectedGenre}
Real Intersection(s): ${intersectionText}

Current Story Context:
${storyLog.slice(-1)[0] || 'The adventure is just beginning...'}

Generate 2-3 story choices for the runner at this intersection. Each choice must:
1. Reference the EXACT intersection name and the direction the runner would turn
2. Be distinct and lead to different story outcomes
3. Be exciting and genre-appropriate (${selectedGenre})
4. Reference the real location (street names, landmarks)

CRITICAL: Format your response as ONLY valid JSON, no other text:
{
  "choices": [
    {
      "id": 1,
      "intersection": "EXACT intersection name from above",
      "direction": "left/straight/right",
      "text": "Choice description that incorporates the location and direction"
    },
    {
      "id": 2,
      "intersection": "EXACT intersection name from above",
      "direction": "left/straight/right",
      "text": "Choice description that incorporates the location and direction"
    }
  ]
}`;

          const response = await fetch('https://api.mistral.ai/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${MISTRAL_API_KEY}`
            },
            body: JSON.stringify({
              model: 'mistral-small-latest',
              max_tokens: 500,
              messages: [{ role: 'user', content: prompt }]
            })
          });

          if (!response.ok) {
            throw new Error(`API Error: ${response.status}`);
          }

          const data = await response.json();
          const responseText = data.content[0].text;
          
          // Extract JSON from response
          const jsonMatch = responseText.match(/\{[\s\S]*\}/);
          if (!jsonMatch) {
            console.error('No JSON found in response:', responseText);
            throw new Error('Invalid response format');
          }

          const parsedChoices = JSON.parse(jsonMatch[0]);
          setChoices(parsedChoices.choices || []);
          setChoicesVisible(true);
        } catch (error) {
          console.error('Error generating choices:', error);
          setIsGenerating(false);
        }
      };

      const handleChoice = async (choice) => {
        setChoices([]);
        setChoicesVisible(false);
        setIsGenerating(true);

        try {
          const chapterPrompt = `You are an expert interactive fiction writer creating immersive adventure stories for runners.

Genre: ${selectedGenre}
Real Location: Runner at ${choice.intersection}, turning ${choice.direction}
Runner's Action: ${choice.text}

Previous Story (for context):
${storyLog.slice(-2).join('\n---\n')}

Write a NEW CHAPTER (MINIMUM 500 words) for this ${selectedGenre} adventure that:
1. Vividly describes what happens as the runner turns ${choice.direction} at ${choice.intersection}
2. Incorporates the real street names and location details
3. Makes the runner feel like the adventure is happening in their real running environment
4. Responds meaningfully to their choice
5. Builds tension, mystery, or excitement appropriate for ${selectedGenre} fiction
6. Includes sensory details (sights, sounds, smells, physical sensations)
7. Ends with a hook that sets up the next decision point
8. Is engaging enough that a runner would be excited to keep going
9. References the specific geography (direction of turn, street names)

Make it immersive, descriptive, and thoroughly entertaining. The minimum 500 words is CRITICAL.`;

          const response = await fetch('https://api.mistral.ai/v1/messages', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${MISTRAL_API_KEY}`
            },
            body: JSON.stringify({
              model: 'mistral-small-latest',
              max_tokens: 2500,
              messages: [{ role: 'user', content: chapterPrompt }]
            })
          });

          if (!response.ok) {
            throw new Error(`API Error: ${response.status}`);
          }

          const data = await response.json();
          const chapterText = data.content[0].text;

          setCurrentChapter(chapterText);
          setStoryLog(prev => [...prev, chapterText]);

          // Generate TTS after chapter is set
          await generateAndPlayAudio(chapterText);
        } catch (error) {
          console.error('Error generating chapter:', error);
          setIsGenerating(false);
        }
      };

      const generateAndPlayAudio = async (text) => {
        setIsAudioPlaying(true);
        
        try {
          // Truncate text for TTS (max 500 chars for preview)
          const textForTTS = text.substring(0, 1000);

          const ttsResponse = await fetch('https://api.mistral.ai/v1/audio/speech', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${MISTRAL_API_KEY}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              model: MISTRAL_TTS_MODEL,
              input: textForTTS,
              voice: MISTRAL_TTS_VOICE
            })
          });

          if (!ttsResponse.ok) {
            console.error('TTS Error:', ttsResponse.status);
            setIsAudioPlaying(false);
            setChoicesVisible(true);
            return;
          }

          const audioBlob = await ttsResponse.blob();
          const url = URL.createObjectURL(audioBlob);
          setAudioUrl(url);

          // Play audio
          if (audioRef.current) {
            audioRef.current.src = url;
            audioRef.current.onended = () => {
              setIsAudioPlaying(false);
              setTimeout(() => setChoicesVisible(true), 300);
            };
            audioRef.current.play().catch(e => {
              console.error('Play error:', e);
              setIsAudioPlaying(false);
              setChoicesVisible(true);
            });
          }
        } catch (error) {
          console.error('TTS Error:', error);
          setIsAudioPlaying(false);
          setChoicesVisible(true);
        }
      };

      // ==================== SAVE & SHARE ====================
      const saveAdventure = () => {
        if (!currentUser) return;

        const adventure = {
          id: Date.now(),
          genre: selectedGenre,
          story: storyLog,
          route: routeHistory,
          createdAt: new Date().toISOString(),
          title: `${selectedGenre.toUpperCase()} Run - ${new Date().toLocaleDateString()}`,
          distance: (routeHistory.length * 0.15).toFixed(2) // Approximate km
        };

        const updatedUser = {
          ...currentUser,
          adventures: [...(currentUser.adventures || []), adventure]
        };

        const users = JSON.parse(localStorage.getItem('runUsers') || '[]');
        const userIndex = users.findIndex(u => u.id === currentUser.id);
        users[userIndex] = updatedUser;
        localStorage.setItem('runUsers', JSON.stringify(users));
        setCurrentUser(updatedUser);

        alert(`Adventure saved! "${adventure.title}"`);
      };

      const shareAdventure = () => {
        const distance = (routeHistory.length * 0.15).toFixed(1);
        const shareText = `🏃 I just completed an epic ${selectedGenre} adventure run! ${distance}km, ${storyLog.length} chapters, ${routeHistory.length} intersections. Check out RunStory - turn your runs into adventures!`;
        
        if (navigator.share) {
          navigator.share({ 
            title: 'RunStory Adventure', 
            text: shareText,
            url: window.location.href 
          });
        } else {
          alert(shareText);
        }
      };

      const startNewAdventure = (genre) => {
        setSelectedGenre(genre);
        setGameState('running');
        const startingText = generateStartingNarrative(genre);
        setCurrentChapter(startingText);
        setStoryLog([startingText]);
        setRouteHistory([]);
        setCurrentLocation(null);
        setPreviousLocation(null);
        setChoices([]);
        setChoicesVisible(false);
        setNearbyIntersections([]);
      };

      const generateStartingNarrative = (genre) => {
        const narratives = {
          fantasy: 'You stand at the edge of an enchanted realm. Your sneakers crunch on path beneath you as you begin to run. The air shimmers with ancient magic. Ahead, you notice the streets around you beginning to transform—street signs glow with an otherworldly light. Every step takes you deeper into a world of dragon lairs, hidden treasure, and mystical prophecies. As you round the first corner, you sense that your choices here will determine the fate of this magical land.',
          'sci-fi': 'You activate your neural interface and your running gear hums to life with futuristic energy. The world around you pixelates—you\'re in the simulation. Your run is a data transmission across cyberspace. With every step, you navigate through digital landscapes, alien territories, and cosmic anomalies. The streets ahead branch into infinite possibilities. As you push forward, you realize you\'re not just running—you\'re hacking reality itself.',
          mystery: 'A mysterious envelope was on your doorstep this morning. Inside: a cryptic map and instructions to run this route. As you leave your house, you notice a black car parked across the street. Who are they? What do they want? The streets around you suddenly feel full of secrets. Every corner could hide a clue, a danger, or a revelation that changes everything. Your heart pounds as you begin to run, knowing that today will expose a conspiracy you never imagined.',
          horror: 'The sun is setting as you lace up your shoes. You\'ve never been superstitious, but today feels different. The streets are unusually quiet. Too quiet. As you start running, you notice things out of place—strange symbols on telephone poles, shadows moving between buildings, the sound of something heavy breathing behind you. You tell yourself it\'s just your imagination, but deep down, you know something sinister is following your every step.',
          adventure: 'This is the moment you\'ve been training for. You\'re about to embark on the greatest adventure of your life. Your GPS is loaded with a mysterious route. Your backpack contains supplies for the unknown. The sun is rising, illuminating endless possibilities. Every intersection ahead promises discovery, danger, and glory. You take your first step, and the world opens up before you—full of treasures, challenges, and stories waiting to be uncovered.'
        };
        return narratives[genre] || narratives.adventure;
      };

      // ==================== RENDER ====================
      if (showAuthModal && !currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="w-full max-w-md">
              <div className="glass-effect rounded-2xl p-8 shadow-2xl">
                <h1 className="text-5xl font-black gradient-text mb-2 font-serif">RunStory</h1>
                <p className="text-gray-300 mb-8 text-sm">Turn your runs into epic adventures with AI</p>

                <form onSubmit={handleAuth} className="space-y-4">
                  <div>
                    <input
                      type="email"
                      placeholder="Email"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      className="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 focus:bg-white/10 transition"
                      required
                    />
                  </div>
                  <div>
                    <input
                      type="password"
                      placeholder="Password"
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      className="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500 focus:bg-white/10 transition"
                      required
                    />
                  </div>
                  <button
                    type="submit"
                    className="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 shadow-lg"
                  >
                    {authMode === 'login' ? 'Login' : 'Sign Up'}
                  </button>
                </form>

                <button
                  onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')}
                  className="w-full mt-4 text-purple-300 hover:text-purple-100 text-sm transition"
                >
                  {authMode === 'login' ? 'Need an account? Sign up' : 'Have an account? Login'}
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (!gameState) {
        return (
          <div className="min-h-screen p-6">
            <div className="max-w-6xl mx-auto">
              {/* Header */}
              <div className="flex justify-between items-center mb-12">
                <div>
                  <h1 className="text-5xl font-black gradient-text font-serif">RunStory</h1>
                  <p className="text-gray-300 mt-2">Epic adventures, real routes</p>
                </div>
                <button
                  onClick={handleLogout}
                  className="px-6 py-2 glass-effect rounded-lg text-white hover:bg-white/20 transition"
                >
                  Logout
                </button>
              </div>

              {/* Genre Selection */}
              <div className="mb-12">
                <h2 className="text-2xl font-bold text-white mb-6">Choose Your Genre</h2>
                <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                  {GENRES.map(genre => {
                    const genreStyles = {
                      fantasy: 'from-purple-600 to-pink-600',
                      'sci-fi': 'from-cyan-600 to-blue-600',
                      mystery: 'from-orange-600 to-red-600',
                      horror: 'from-red-900 to-black',
                      adventure: 'from-green-600 to-emerald-600'
                    };

                    const genreEmojis = {
                      fantasy: '🐉',
                      'sci-fi': '🚀',
                      mystery: '🔍',
                      horror: '👻',
                      adventure: '⛰️'
                    };

                    return (
                      <button
                        key={genre}
                        onClick={() => startNewAdventure(genre)}
                        className={`genre-card relative overflow-hidden rounded-xl p-6 text-center group bg-gradient-to-br ${genreStyles[genre] || genreStyles.adventure}`}
                      >
                        <div className="relative z-10">
                          <div className="text-4xl mb-2">{genreEmojis[genre]}</div>
                          <h3 className="text-xl font-bold text-white capitalize">{genre}</h3>
                          <p className="text-white/70 text-sm mt-2 text-xs">
                            {genre === 'fantasy' && 'Dragons, magic, quests'}
                            {genre === 'sci-fi' && 'Aliens, tech, space'}
                            {genre === 'mystery' && 'Clues, secrets, twists'}
                            {genre === 'horror' && 'Thrills, chills, frights'}
                            {genre === 'adventure' && 'Exploration, action, thrills'}
                          </p>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Saved Adventures */}
              {currentUser?.adventures?.length > 0 && (
                <div>
                  <h2 className="text-2xl font-bold text-white mb-6">Your Adventures</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {currentUser.adventures.map(adventure => (
                      <div
                        key={adventure.id}
                        className="glass-effect rounded-xl p-6 hover:border-purple-400 border-white/20 border transition"
                      >
                        <h3 className="text-xl font-bold text-white mb-2">{adventure.title}</h3>
                        <div className="space-y-1 text-sm text-gray-300 mb-4">
                          <p>📖 {adventure.story.length} chapters</p>
                          <p>🛣️ {adventure.route.length} intersections</p>
                          <p>🏃 ~{adventure.distance}km</p>
                        </div>
                        <button
                          onClick={shareAdventure}
                          className="text-purple-400 hover:text-purple-300 text-sm flex items-center gap-2 transition"
                        >
                          <span>📤</span> Share
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // Running View
      return (
        <div className="min-h-screen p-4">
          <div className="max-w-4xl mx-auto">
            {/* Header */}
            <div className="flex justify-between items-center mb-6">
              <div>
                <h2 className="text-3xl font-bold gradient-text capitalize font-serif">{selectedGenre} Adventure</h2>
                {currentLocation && (
                  <p className="text-gray-300 text-sm mt-1">📍 {currentLocation.lat.toFixed(4)}, {currentLocation.lng.toFixed(4)}</p>
                )}
              </div>
              <div className="flex gap-3">
                {isRunning ? (
                  <button
                    onClick={stopTracking}
                    className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg flex items-center gap-2 transition font-semibold"
                  >
                    ⏹️ Stop
                  </button>
                ) : (
                  <button
                    onClick={startTracking}
                    className="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg flex items-center gap-2 transition font-semibold"
                  >
                    ▶️ Start
                  </button>
                )}
                <button
                  onClick={saveAdventure}
                  className="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg flex items-center gap-2 transition font-semibold"
                >
                  💾 Save
                </button>
              </div>
            </div>

            {/* Story Display */}
            <div className="glass-effect rounded-xl p-8 mb-6">
              {currentChapter ? (
                <>
                  <div className="text-white/90 leading-relaxed mb-6 text-lg font-serif story-text">
                    {currentChapter}
                  </div>
                  
                  {audioUrl && (
                    <div className="mb-6 p-4 bg-black/30 rounded-lg">
                      <audio
                        ref={audioRef}
                        className="w-full"
                      />
                      {isAudioPlaying && (
                        <div className="flex items-center gap-3 text-purple-400 text-sm mt-3">
                          <div className="audio-wave">
                            <div className="audio-bar"></div>
                            <div className="audio-bar"></div>
                            <div className="audio-bar"></div>
                            <div className="audio-bar"></div>
                            <div className="audio-bar"></div>
                          </div>
                          <span>Narrator speaking... choices reveal when finished</span>
                        </div>
                      )}
                    </div>
                  )}

                  {isGenerating && (
                    <div className="text-center py-8">
                      <div className="inline-block">
                        <div className="flex gap-1 mb-3">
                          <div className="w-2 h-2 bg-purple-400 rounded-full pulse-dot"></div>
                          <div className="w-2 h-2 bg-purple-400 rounded-full pulse-dot" style={{animationDelay: '0.2s'}}></div>
                          <div className="w-2 h-2 bg-purple-400 rounded-full pulse-dot" style={{animationDelay: '0.4s'}}></div>
                        </div>
                      </div>
                      <p className="text-gray-300 font-semibold">Generating next chapter...</p>
                    </div>
                  )}

                  {choicesVisible && !isAudioPlaying && !isGenerating && choices.length > 0 && (
                    <div className="space-y-3">
                      <p className="text-gray-300 font-semibold mb-4">
                        🛣️ You arrive at {choices[0]?.intersection}. What do you do?
                      </p>
                      {choices.map(choice => (
                        <button
                          key={choice.id}
                          onClick={() => handleChoice(choice)}
                          className="choice-button w-full p-5 bg-gradient-to-r from-purple-600/50 to-pink-600/50 hover:from-purple-600 hover:to-pink-600 border border-white/20 rounded-lg text-white transition text-left group"
                        >
                          <p className="font-semibold text-sm text-gray-200 mb-2 capitalize">
                            ↪️ Turn {choice.direction} at {choice.intersection}
                          </p>
                          <p className="text-white group-hover:text-white/95 transition">{choice.text}</p>
                        </button>
                      ))}
                    </div>
                  )}

                  {!isRunning && !isGenerating && !choicesVisible && !isAudioPlaying && (
                    <div className="text-center py-6 border-t border-white/10 mt-6">
                      <p className="text-gray-300 mb-3">Keep running to reach the next intersection...</p>
                      <button
                        onClick={startTracking}
                        className="px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition font-semibold"
                      >
                        ▶️ Resume
                      </button>
                    </div>
                  )}
                </>
              ) : (
                <div className="text-center py-12">
                  <p className="text-gray-300 mb-4 text-lg">🏃 Start running to begin your adventure...</p>
                  {isRunning && (
                    <div className="flex items-center justify-center gap-2 text-purple-400">
                      <span className="pulse-dot inline-block w-2 h-2 bg-purple-400 rounded-full"></span>
                      Tracking location...
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Stats */}
            <div className="grid grid-cols-3 gap-4">
              <div className="glass-effect rounded-lg p-4 text-center">
                <p className="text-gray-400 text-sm mb-1">Chapters</p>
                <p className="text-3xl font-black gradient-text">{storyLog.length}</p>
              </div>
              <div className="glass-effect rounded-lg p-4 text-center">
                <p className="text-gray-400 text-sm mb-1">Intersections</p>
                <p className="text-3xl font-black text-pink-400">{routeHistory.length}</p>
              </div>
              <div className="glass-effect rounded-lg p-4 text-center">
                <p className="text-gray-400 text-sm mb-1">Status</p>
                <p className="text-3xl font-black text-green-400">{isRunning ? '🏃 Running' : '⏸️ Paused'}</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.render(<RunAdventureApp />, document.getElementById('root'));
  </script>

</body>
</html>
